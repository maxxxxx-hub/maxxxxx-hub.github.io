<script>
let score = 0;
let crushName = "Veronica";

// Function to create a bear
function createBear() {
  const bear = document.createElement("div");
  bear.className = "bear";
  bear.innerHTML = "🐻";
  bear.style.left = Math.random() * (window.innerWidth - 50) + "px";
  document.body.appendChild(bear);

  // Click event
  bear.addEventListener("click", function() {
    score++;

    // Update score safely
    const scoreEl = document.getElementById("score");
    if(scoreEl) {
      scoreEl.textContent = score;
    }

    bear.remove();

    // Show final message after 5 bears
    if (score >= 5) {
      const messageEl = document.getElementById("message");
      const finalTextEl = document.getElementById("finalText");
      if(messageEl && finalTextEl){
        messageEl.style.display = "block";
        finalTextEl.textContent = "Okay fine… Veronica, if you caught it, you keep it. And maybe… me too? 😳";
      }
    }
  });

  // Remove bear after 4 seconds if not clicked
  setTimeout(() => {
    bear.remove();
  }, 4000);
}

// Spawn bears every 0.8 seconds
setInterval(createBear, 800);
</script>
