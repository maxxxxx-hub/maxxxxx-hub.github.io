<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Catch My Bear 🐻</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(135deg, #f6d365, #fda085);
  font-family: Arial, sans-serif;
  text-align: center;
}

h1 {
  margin-top: 20px;
  color: white;
}

.bear {
  position: absolute;
  font-size: 40px;
  cursor: pointer;
  animation: float 4s linear forwards;
}

@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

#message {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  padding: 30px;
  border-radius: 20px;
  display: none;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
  width: 80%;
  max-width: 320px;
}
</style>
</head>
<body>
<h1>Catch My Bear 🐻</h1>
<p style="color:white;">Bears Caught: <span id="score">0</span></p>

<div id="message">
  <h2>You caught my bear 🐻</h2>
  <p id="finalText"></p>
</div>

<script>
let score = 0;
let crushName = "Veronica";

function createBear() {
  const bear = document.createElement("div");
  bear.className = "bear";
  bear.innerHTML = "🐻";
  bear.style.left = Math.random() * (window.innerWidth - 50) + "px";
  document.body.appendChild(bear);

  bear.addEventListener("click", function() {
    score++;
    document.getElementById("score").textContent = score;
    bear.remove();

    if (score >= 5) {
      document.getElementById("message").style.display = "block";
      document.getElementById("finalText").textContent =
        "Okay fine… Veronica, if you caught it, you keep it. And maybe… me too? 😳";
    }
  });

  setTimeout(() => {
    bear.remove();
  }, 4000);
}

setInterval(createBear, 800);
</script>
</body>
</html>
